name: CI

on:
  push:
    branches: [main]
  schedule:
    # 03:00 UTC nightly. Mirrors .github/workflows/ci.yml so the
    # `validate --all` tier runs once daily on the lab runner.
    # Forgejo schedules only fire from the default branch; keep this
    # workflow on main for the schedule to trigger.
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  # Push runs of the same ref cancel each other; nightly runs do not
  # (each scheduled run is its own ref/sha and gets its own group key).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    # Skipped on schedule — the nightly job's `validate --all` runs
    # `nix fmt --fail-on-change` as its first step.
    if: github.event_name != 'schedule'
    name: Format check
    runs-on: native
    steps:
      - uses: actions/checkout@v4
      - run: nix fmt -- --ci

  validate:
    # Small tier — every push to main + manual dispatch.
    # `validate --rust` covers fmt + flake check + eval-tests +
    # cargo nextest + clippy + host builds + per-package builds.
    if: github.event_name != 'schedule'
    name: validate --rust (small tier)
    runs-on: native
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - run: nix run .#validate -- --rust
        env:
          # Lab runner uses DynamicUser=true; systemd marks the
          # idmapped StateDirectory bind noexec, which kills cargo
          # build-script binaries. Land target/ in /tmp instead —
          # exec-clean, and on the host root (300+ GB free) thanks
          # to PrivateTmp=false in the runner module. Run-id keyed
          # so concurrent jobs don't collide. github runners
          # ignore: target/ defaults to PWD which is fine there.
          CARGO_TARGET_DIR: /tmp/cargo-target-${{ github.run_id }}
          NIX_CONFIG: "warn-dirty = false"

  nightly:
    # Full tier — scheduled nightly + manual dispatch. Adds every
    # fleet-harness-* scenario (smoke, teardown, rollback-policy,
    # auditor-chain, signed-roundtrip, deadline-expiry, secret-hygiene,
    # stale-target, boot-recovery, manifest-tamper-rejection,
    # corruption-rejection, module-rollouts-wire) and the fleet-N
    # scaling variants (fleet-2, fleet-5, fleet-10).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: validate --all (full tier)
    runs-on: native
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - run: nix run .#validate -- --all
        env:
          CARGO_TARGET_DIR: /tmp/cargo-target-${{ github.run_id }}
          NIX_CONFIG: "warn-dirty = false"

# NixFleet — EU Market Analysis
primary_markets:
  - country: France
    regulator: ANSSI
    nis2_entities: 15000
    key_regulation: "Loi Résilience (NIS2 transposition)"
    opportunity: "Largest single-country NIS2 market in EU"

  - country: Germany
    regulator: BSI
    key_regulation: "NIS2UmsuCG"
    opportunity: "Strong digital sovereignty mandate, large enterprise base"

  - country: Netherlands
    key_regulation: "Wet beveiliging netwerk- en informatiesystemen"
    opportunity: "Tech-forward, high NixOS community penetration"

  - country: Belgium
    key_regulation: "NIS2 via CCB"
    opportunity: "EU institutions headquarters"

  - country: Switzerland
    key_regulation: "nDSG (data protection, NIS2-adjacent)"
    opportunity: "Finance, pharma, neutrality-conscious"

  - country: Nordics
    opportunity: "High digital maturity, sovereignty-conscious"

verticals:
  - name: Government/Public Sector
    priority: high
    pain: "NIS2 compliance, sovereignty mandate, audit requirements"
    entry: "ANSSI qualification, public procurement frameworks"

  - name: Finance/Banking
    priority: high
    pain: "DORA regulation, operational resilience, audit trail"
    entry: "Compliance-driven POC"

  - name: Healthcare
    priority: medium
    pain: "Patient data sovereignty, system availability"
    entry: "Regional hospital groups"

  - name: Energy/Utilities
    priority: medium
    pain: "OT/IT convergence, critical infrastructure protection"
    entry: "Smart grid deployments"

  - name: HPC/Research
    priority: medium
    pain: "Reproducible computing environments, large fleet management"
    entry: "NixOS already used in some HPC centers"

funding_sources:
  - name: BPI France
    type: grant/loan
    relevance: "Deep tech, sovereignty"
  - name: NGI (Next Generation Internet)
    type: EU grant
    relevance: "Open source infrastructure"
  - name: Horizon Europe
    type: EU grant
    relevance: "Digital sovereignty, cybersecurity"
  - name: Sovereign Tech Fund
    type: EU fund
    relevance: "Already invested €226k in Nix ecosystem (2023)"

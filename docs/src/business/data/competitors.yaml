# NixFleet — Competitive Landscape
competitors:
  - name: Ansible/AWX
    type: configuration-management
    weakness: "Mutable state, drift inévitable, résultat dépend de l'état existant"
    advantage_over: paradigm

  - name: Puppet
    type: configuration-management
    weakness: "Complexe à l'échelle, agent lourd, DSL propriétaire"
    advantage_over: paradigm

  - name: Jamf/Kandji
    type: mdm
    weakness: "Apple-only, cloud-dependent, opaque, cher"
    advantage_over: sovereignty

  - name: Microsoft Intune
    type: mdm
    weakness: "Lock-in Microsoft, Windows-centric, compliance theater"
    advantage_over: sovereignty

  - name: Fleet.dm
    type: osquery
    weakness: "OSS mais pas NixOS-native, pas de souveraineté"
    advantage_over: paradigm

  - name: Colmena
    type: nix-tool
    weakness: "Communautaire, pas de support commercial, pas d'UI"
    advantage_over: commercial

  - name: Determinate Systems
    type: nix-tooling
    weakness: "Focus sur DX développeur, pas fleet management"
    relationship: potential-partner

  - name: Cachix
    type: binary-cache
    weakness: "Cache only, pas de fleet management"
    relationship: potential-partner

  - name: Crystal Forge
    type: nix-fleet-compliance
    url: "https://gitlab.com/crystal-forge/crystal-forge"
    license: AGPLv3
    stack: "Rust (4 components) + PostgreSQL"
    team: "Solo developer (usmcamp0811)"
    maturity: "Early MVP — monitoring/build/CVE works, deployment execution incomplete"
    last_active: "2026-03-20"
    commits: 1107
    weakness: "Solo dev, AGPLv3 limits enterprise adoption, no deployment execution yet, no DX story, broken website"
    strengths:
      - "Compliance-first: 30+ STIG modules, OSCAL output planned"
      - "CVE scanning via vulnix with per-system audit trail"
      - "Configuration drift detection (running vs evaluated)"
      - "Cryptographic audit: Ed25519 signed agent reports, hardware fingerprinting"
      - "Multi-flake support"
    advantage_over: execution
    watch_for:
      - "CVE scanning integration pattern (vulnix)"
      - "STIG-as-code modules (adaptable as Nix modules)"
      - "Configuration drift detection approach"
      - "OSCAL compliance output format"
    review_date: "2026-03-25"
    next_review: "2026-09-25"

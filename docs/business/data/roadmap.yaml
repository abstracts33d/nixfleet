# NixFleet — Technical Roadmap
phases:
  - id: phase-0
    name: "Simplification"
    status: done
    description: "Single mkHost API replacing mkFleet/mkOrg/mkRole/mkBatchHosts/mkTestMatrix"
    deliverables:
      - "mkHost returns nixosSystem/darwinSystem directly"
      - "Scopes as plain NixOS modules (no deferred registration)"
      - "Agent/CP as standard NixOS service modules"
      - "VM helpers via nixfleet.lib.mkVmApps"
      - "Eval tests and VM tests passing"
      - "Fleet repo migrated to new API"

  - id: phase-1
    name: "Rust Hardening"
    status: done
    description: "Make the control plane deployable on a real network"
    stories:
      - id: S1
        name: mTLS agent-to-CP authentication
        priority: high
        status: done
      - id: S2
        name: API key auth for operators
        priority: high
        status: done
      - id: S3
        name: TLS-only control plane
        priority: high
        status: done
      - id: S4
        name: Audit log + migrations
        priority: high
        status: done
        description: "Audit log table, CSV export, refinery migrations, identity tracking"

  - id: phase-2
    name: "Open Source"
    status: planned
    description: "Ship nixfleet as a credible open-source project"
    requires: ["phase-0", "phase-1"]
    stories:
      - id: S5
        name: Public repository + docs
        priority: high
        description: "README, CONTRIBUTING, LICENSE (AGPL-3.0 CP / MIT framework), getting-started, architecture docs"
      - id: S6
        name: Community launch
        priority: medium
        description: "Landing page, NixOS Discourse, Hacker News, NixCon 2026 proposal"

  - id: phase-3
    name: "Framework Infrastructure"
    status: planned
    description: "Optional NixOS modules for common fleet infrastructure — any consumer can enable with minimal config"
    stories:
      - id: S7
        name: Attic binary cache modules
        priority: high
        description: "nixfleet.nixosModules.attic-server (atticd wrapper, agenix secrets, impermanence) + nixfleet.nixosModules.attic-client (substituters, trusted keys, CLI)"
      - id: S8
        name: microvm.nix host module
        priority: medium
        description: "nixfleet.nixosModules.microvm-host — TAP networking defaults, virtiofs, resource presets"

  - id: phase-4
    name: "Consulting + Enterprise"
    status: planned
    description: "NIS2 consulting pipeline feeding product development"
    requires: ["phase-2"]
    stories:
      - id: S9
        name: NIS2 consulting positioning
        priority: high
        description: "One-pager, LinkedIn positioning, audit report template"
      - id: S10
        name: Pilot engagements
        priority: high
        description: "3 pilot clients (5-10 machines each), feedback to enterprise backlog"
      - id: S11
        name: Enterprise feature split
        priority: medium
        description: "Multi-tenant CP, RBAC, compliance reporting, PostgreSQL, dashboard"

tech_stack:
  control_plane: "Rust (Axum)"
  agent: "Rust (static binary)"
  cache: "Attic (S3-compatible)"
  secrets: "agenix / sops-nix"
  config: "NixOS flakes"
  frontend: "SvelteKit (Phase 4)"

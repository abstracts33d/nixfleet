# NixFleet — Business Model
license: Apache 2.0 (core)
model: open-core

tiers:
  - name: Community
    price: Gratuit
    target: "Équipes techniques, <10 machines"
    features:
      - Core engine CLI
      - Up to 10 machines
      - Community support
      - Apache 2.0

  - name: Pro
    price_range: "€499-2,999/mois"
    target: "PME, 10-200 machines"
    features:
      - Dashboard UI
      - Audit logs
      - RBAC
      - Binary cache hosting
      - Email support

  - name: Enterprise
    price_range: "€50k-500k/an"
    target: "Grandes entreprises, 200+ machines"
    features:
      - SSO/SAML
      - SLA garanti
      - On-prem control plane
      - Dedicated support
      - Custom integrations
      - NIS2 compliance package

  - name: Sovereign
    price_range: "Custom, €100k+ ACV"
    target: "Gouvernement, défense, infrastructure critique"
    features:
      - Air-gapped deployment
      - Source code escrow
      - ANSSI/BSI certification support
      - On-site deployment

services:
  - Migration from Ansible/Puppet
  - Fleet onboarding
  - Training & certification
  - Managed binary cache

revenue_cap_services: 30%

fundraising:
  stage: pre-seed
  ask: "€1.5M"
  allocation:
    engineering: 40%
    opensource_community: 25%
    eu_certifications: 20%
    gtm: 15%

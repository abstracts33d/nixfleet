# NixFleet — NIS2 Obligation Mapping
directive: "NIS2 (EU 2022/2555)"
french_transposition: "Loi Résilience"
deadline: "2027-12-31"
entities_france: 15000
max_fine: "€10M or 2% global revenue"
personal_liability: true

obligations:
  - name: "Traçabilité des modifications SI"
    classic_approach: "SIEM + outils séparés, +€30k/an"
    nixfleet_approach: "Chaque changement = commit Git signé. Gratuit."
    status: native

  - name: "Reprise après incident en 24h"
    classic_approach: "Runbooks, tests manuels, incertain"
    nixfleet_approach: "Rollback atomique <90s vers génération validée"
    status: native

  - name: "Sécurité chaîne d'approvisionnement"
    classic_approach: "Outils SBOM séparés, intégration manuelle"
    nixfleet_approach: "SBOM CycloneDX/SPDX auto depuis flake.lock"
    status: native

  - name: "Inventaire des actifs numériques"
    classic_approach: "CMDB coûteuse, souvent inexacte"
    nixfleet_approach: "Inventaire complet dans nixosConfigurations"
    status: native

  - name: "Notification incident <24h"
    classic_approach: "Difficile à documenter précisément"
    nixfleet_approach: "État machine prouvable à tout instant historique"
    status: native

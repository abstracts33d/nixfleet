# NixFleet — 6 Facteurs Clés de Succès
factors:
  - id: reproducibility
    name: Reproductibilité déclarative absolue
    rank: 1
    badge: Avantage paradigmatique
    summary: "Même flake.nix → même système, bit pour bit, toujours"
    detail: "NixOS traite la configuration comme une fonction pure. Deux machines avec le même flake sont identiques, aujourd'hui ou dans 3 ans."
    differentiator: "Ansible/Puppet dépendent de l'état existant — la dérive est inévitable"

  - id: sovereignty
    name: Souveraineté & indépendance totale
    rank: 2
    badge: Différenciateur commercial
    summary: "Auto-hébergeable intégralement, Apache 2.0, zéro dépendance"
    detail: "Moteur core, plan de contrôle, cache binaire, secrets — tout est auto-hébergeable. Si NixFleet disparaît, la flotte continue."
    differentiator: "Jamf, Intune, AWX dépendent de leur cloud"

  - id: rollback
    name: Rollback atomique & résilience
    rank: 3
    badge: Résilience opérationnelle
    summary: "Rollback flotte <90s, zéro état intermédiaire"
    detail: "Chaque déploiement crée une génération immuable. La transition est atomique."
    differentiator: "Aucun concurrent ne garantit l'atomicité sur l'OS"

  - id: security
    name: Sécurité structurelle multi-couches
    rank: 4
    badge: Sécurité vérifiable
    summary: "SHA-256 store, impermanence optionnelle, SBOM automatique"
    detail: "Store adressé par hash, impermanence élimine la persistance malware, SBOM depuis flake.lock."
    differentiator: "Garanties vérifiables, pas déclaratives"

  - id: nis2
    name: Conformité NIS2 par construction
    rank: 5
    badge: Tailwind réglementaire
    summary: "Traçabilité, reprise, supply chain — natifs"
    detail: "Chaque changement = commit signé, chaque génération reproductible, chaque dépendance épinglée."
    differentiator: "La conformité est un produit dérivé, pas un effort additionnel"

  - id: cost
    name: Réduction substantielle des coûts
    rank: 6
    badge: ROI démontrable
    summary: "3-5x moins cher que Ansible + AWX + compliance séparée"
    detail: "Élimination outils compliance séparés, réduction temps ingénieur, suppression licences MDM."
    differentiator: "ROI mesurable dès le premier trimestre"

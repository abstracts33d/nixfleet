name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/mdbook/**"
      - "modules/options-doc.nix"
      - "modules/rust-packages.nix"
      - "rfcs/**"
      - "flake.nix"
      - "flake.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build docs
        run: nix run .#docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/mdbook/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
